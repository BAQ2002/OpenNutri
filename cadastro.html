<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <!-- Estilos externos -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Título principal -->
        <header>
            <h1>Cadastro de Usuário</h1>
        </header>

        <!-- Formulário de Cadastro -->
        <main>
            <form id="formCadastro">
                <!-- Campo de Idade -->
                <div class="form-group">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" min="0" max="120" required>
                </div>

                <!-- Campo de Peso -->
                <div class="form-group">
                    <label for="peso">Peso (kg):</label>
                    <input type="number" id="peso" name="peso" step="0.1" required>
                </div>

                <!-- Campo de Altura -->
                <div class="form-group">
                    <label for="altura">Altura (cm):</label>
                    <input type="number" id="altura" name="altura" step="1" required>
                </div>

                <!-- Campo de Gênero -->
                <div class="form-group">
                    <label for="genero">Gênero:</label>
                    <select id="genero" name="genero" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <!-- Atividade Física -->
                <fieldset class="form-group">
                    <legend>Você pratica atividade física?</legend>
                    <label>
                        <input type="radio" id="atividadeSim" name="atividade" value="sim"> Sim
                    </label>
                    <label>
                        <input type="radio" id="atividadeNao" name="atividade" value="nao"> Não
                    </label>
                </fieldset>

                <!-- Campo de Tipos de Atividade -->
                <fieldset class="checkbox-label" id="atividadesCampo" style="display: flex;">
                    <legend>Quais atividades você pratica?</legend>
                    <div>
                        <label>
                            <input type="checkbox" name="atividadeF" value="Musculacao"> Musculação
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="atividadeF" value="Futebol"> Futebol
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="atividadeF" value="Basquete"> Basquete
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="atividadeF" value="Crossfit"> Crossfit
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="atividadeF" value="Tenis"> Tênis
                        </label>
                    </div>
                </fieldset>

                <!-- Botão de Enviar -->
                <div class="form-group">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
        </main>

        <!-- Resultado -->
        <footer>
            <p id="resultado"></p>
        </footer>
    </div>

    <!-- Scripts externos -->
    <script src="scripts/scriptCadastro.js"></script>
</body>

</html>
